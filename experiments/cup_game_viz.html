<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3-Cup Shell Game Visualization</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin-top: 100px;
            height: 200px;
        }
        .cup-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
        }
        .cup {
            width: 100px;
            height: 120px;
            background-color: #e67e22;
            border-radius: 50px 50px 10px 10px;
            position: relative;
            z-index: 2;
            transition: transform 0.5s ease-in-out;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .cup::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 10%;
            width: 80%;
            height: 10px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 5px;
        }
        .ball {
            width: 30px;
            height: 30px;
            background-color: #f1c40f;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            z-index: 1;
            display: none;
            box-shadow: 0 0 10px #f1c40f;
        }
        .cup.lifted {
            transform: translateY(-80px);
        }
        .controls {
            margin-top: 50px;
            text-align: center;
            max-width: 600px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background-color: #2ecc71;
        }
        .message-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #34495e;
            border-radius: 8px;
            min-height: 100px;
            width: 100%;
            border-left: 5px solid #f1c40f;
        }
        .label {
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 5px;
        }
        .scratchpad {
            font-style: italic;
            color: #bdc3c7;
            font-size: 0.9em;
            margin-bottom: 10px;
            display: block;
        }
    </style>
</head>
<body>
    <h1>3-Cup Shell Game</h1>
    
    <div class="container">
        <div class="cup-wrapper" onclick="liftCup(0)">
            <div id="cup-0" class="cup"></div>
            <div id="ball-0" class="ball"></div>
            <div style="margin-top: 10px;">Left [0]</div>
        </div>
        <div class="cup-wrapper" onclick="liftCup(1)">
            <div id="cup-1" class="cup"></div>
            <div id="ball-1" class="ball"></div>
            <div style="margin-top: 10px;">Middle [1]</div>
        </div>
        <div class="cup-wrapper" onclick="liftCup(2)">
            <div id="cup-2" class="cup"></div>
            <div id="ball-2" class="ball"></div>
            <div style="margin-top: 10px;">Right [2]</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="shuffle()">Shuffle Cups</button>
        <button onclick="resetGame()">Reset</button>
        
        <div class="message-box">
            <div class="label">Dealer's Voice:</div>
            <span id="scratchpad-text" class="scratchpad"></span>
            <div id="dealer-text">"Step right up! Find the golden ball and win a prize!"</div>
        </div>
    </div>

    <script>
        let truePosition = 1;
        let isRevealed = false;

        function resetGame() {
            truePosition = Math.floor(Math.random() * 3);
            isRevealed = false;
            document.querySelectorAll('.cup').forEach(c => c.classList.remove('lifted'));
            document.querySelectorAll('.ball').forEach(b => b.style.display = 'none');
            document.getElementById('ball-' + truePosition).style.display = 'block';
            document.getElementById('dealer-text').innerText = '"The ball has been hidden. Good luck!"';
            document.getElementById('scratchpad-text').innerText = '';
        }

        function liftCup(index) {
            const cup = document.getElementById('cup-' + index);
            cup.classList.toggle('lifted');
            if (index === truePosition) {
                document.getElementById('dealer-text').innerText = '"You found it! Nice work."';
            } else {
                document.getElementById('dealer-text').innerText = '"Empty! Better luck next time."';
            }
        }

        async function shuffle() {
            document.querySelectorAll('.cup').forEach(c => c.classList.remove('lifted'));
            await new Promise(r => setTimeout(r, 500));
            document.querySelectorAll('.ball').forEach(b => b.style.display = 'none');
            
            document.getElementById('dealer-text').innerText = '"Watch closely..."';
            
            const cups = [0, 1, 2];
            for (let i = 0; i < 5; i++) {
                // Visual swap effect
                const idx1 = Math.floor(Math.random() * 3);
                const idx2 = (idx1 + 1) % 3;
                const c1 = document.getElementById('cup-' + idx1);
                const c2 = document.getElementById('cup-' + idx2);
                
                c1.style.transform = 'translateY(-20px)';
                c2.style.transform = 'translateY(-20px)';
                await new Promise(r => setTimeout(r, 200));
                c1.style.transform = '';
                c2.style.transform = '';
                await new Promise(r => setTimeout(r, 200));
            }
            
            resetGame();
        }

        // Initialize
        resetGame();
    </script>
</body>
</html>
